name: Release Anmar Bid Pro

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Delete Cargo.lock to force fresh dependency resolution
        run: Remove-Item -Path "src-tauri/Cargo.lock" -ErrorAction SilentlyContinue

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Anmar Bid Pro ${{ github.ref_name }}'
          releaseBody: |
            ## Anmar Bid Pro ${{ github.ref_name }}
            ### Installation
            1. Download `Anmar.Bid.Pro_${{ github.ref_name }}_x64-setup.exe` below
            2. Run it — click "More info" then "Run anyway" if Windows warns you
            3. Launch from Start Menu or Desktop shortcut
            **Existing users:** Your jobs and data are preserved automatically.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      - name: Upload latest.json for updater
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $nsis = "src-tauri/target/release/bundle/nsis/Anmar Bid Pro_${version}_x64-setup.nsis.zip"
          $nsis_sig = "src-tauri/target/release/bundle/nsis/Anmar Bid Pro_${version}_x64-setup.nsis.zip.sig"
          $msi = "src-tauri/target/release/bundle/msi/Anmar Bid Pro_${version}_x64_en-US.msi.zip"
          $msi_sig = "src-tauri/target/release/bundle/msi/Anmar Bid Pro_${version}_x64_en-US.msi.zip.sig"

          $nsis_sig_content = ""
          $msi_sig_content = ""

          if (Test-Path $nsis_sig) { $nsis_sig_content = Get-Content $nsis_sig -Raw }
          if (Test-Path $msi_sig)  { $msi_sig_content  = Get-Content $msi_sig  -Raw }

          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"

          $latest = @{
            version = $version
            notes = "Anmar Bid Pro $tag"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $nsis_sig_content.Trim()
                url = "https://github.com/$repo/releases/download/$tag/Anmar Bid Pro_${version}_x64-setup.nsis.zip"
              }
            }
          }

          $latest | ConvertTo-Json -Depth 5 | Out-File -FilePath "latest.json" -Encoding utf8
          cat latest.json

          gh release upload $tag latest.json --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
